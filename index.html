    <meta property="og:image:alt" content="Bozótirtás meredek terepen MDB LV300 PRO géppel">
    <meta name="twitter:card" content="summary_large_image">

    <meta name="twitter:description" content="Professzionális telektisztítás, bozótirtás és zöldhulladék-kezelés korszerű gépparkkal. Meredek terepen is hatékony munkavégzés, gyors kiszállás és megbízható kivitelezés.">
    <meta name="twitter:image" content="https://zoldhulladek.com/images/hero-desktop-1600.webp">
    <link rel="preload" href="/fonts/InterVariable.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/images/hero-mobile-960.webp" as="image" type="image/webp" imagesrcset="/images/hero-mobile-540.webp 540w, /images/hero-mobile-828.webp 828w, /images/hero-mobile-960.webp 960w" imagesizes="100vw" media="(max-width: 767px)" fetchpriority="high">
    <link rel="preload" href="/images/hero-desktop-1280.webp" as="image" type="image/webp" imagesrcset="/images/hero-desktop-1024.webp 1024w, /images/hero-desktop-1280.webp 1280w, /images/hero-desktop-1600.webp 1600w" imagesizes="100vw" media="(min-width: 768px)" fetchpriority="high">
    <style>
      html, body, #app { min-height: 100%; }
      html {
        background: #000;
        overscroll-behavior-y: none;
      }
      body {
        margin: 0;
        background: #000;
        color: #fff;
        font-family: "InterVariable", "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        font-optical-sizing: auto;
        overflow-x: hidden;
        overscroll-behavior-y: none;
      }
      #app {
        min-height: 100vh;
        min-height: 100svh;
      }

      [data-critical-header="true"][data-scrolled="false"],
      [data-critical-header="true"][data-scrolled="true"] {
        height: 44px;
      }

      [data-critical-logo="true"] {
        display: inline-block;
        line-height: 1;
        white-space: nowrap;
      }

      [data-critical-hero="true"] {
        position: relative;
        min-height: 100vh;
        min-height: 100svh;
        padding-top: calc(env(safe-area-inset-top) + 4rem);
      }

      [data-critical-hero-bg="true"] {
        position: absolute;
        inset: 0;
        z-index: 0;
      }

      [data-critical-hero-media="true"] {
        display: block;
        width: 100%;
        height: 100%;
      }

      [data-critical-hero-img="true"] {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: 76% 35%;
        transform: scale(1.05);
      }

      [data-critical-hero-content="true"] {
        position: relative;
        z-index: 10;
        min-height: calc(100vh - env(safe-area-inset-top) - 4rem);
        min-height: calc(100svh - env(safe-area-inset-top) - 4rem);
      }

      /* Critical shell so the header/logo paints before Vue bootstraps */
      #app-shell-header {
        position: fixed;
        inset: 0 0 auto 0;
        z-index: 40;
        background: #000;
      }

      #app-shell-inner {
        max-width: 1280px;
        margin: 0 auto;
        min-height: 44px;
        padding: 0 16px;
        display: flex;
        align-items: center;
      }

      #app-shell-logo {
        color: #fff;
        text-decoration: none;
        font-size: 1.5rem;
        line-height: 1;
        font-weight: 700;
        letter-spacing: -0.04em;
      }

      #app-shell-logo-accent {
        color: #3FA34D;
      }

      @media (min-width: 768px) {
        [data-critical-header="true"][data-scrolled="false"] { height: 88px; }
        [data-critical-header="true"][data-scrolled="true"] { height: 72px; }

        [data-critical-hero="true"] {
          height: 100vh;
          min-height: 700px;
          padding-top: 0;
        }

        [data-critical-hero-img="true"] {
          object-position: center;
        }

        [data-critical-hero-content="true"] {
          min-height: 0;
        }

        #app-shell-inner {
          min-height: 88px;
          padding: 0 24px;
        }

        #app-shell-logo {
          font-size: 1.875rem;
        }
      }
    </style>
    <title>Telektisztítás és bozótirtás - zoldhulladek.com</title>
  </head>
  <body>
    <div id="app">
      <nav id="app-shell-header">
        <div id="app-shell-inner">
          <a id="app-shell-logo" href="#">
            ÖKO<span id="app-shell-logo-accent">RENDSZER</span>
          </a>
        </div>
      </nav>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
